<html>
    <head>
        <meta charset="UTF-8">
        <title>C.D.I. Lycée</title>
		<link rel="stylesheet" href="styles/boucher.css">
       
    </head>
    <body>
		<div id="intro"> <!-- page d'intro avec dessin à ajouter-->
			<button id="suivant1" class="Suivant" onclick='deroul()'> Suivant </button>
			<div id="txt1" class="Txt"> Vous arrivez au CDI </div>
			<div id="speaker1" class="Speaker"> NARRATEUR </div>
		</div>
		
		<div id="fond"><!-- fond de jeu avec armoire-->
			<img id="bibli" src="images/boucher/bibli.png">
			
			
			<!-- les divs de paroles (personnage, texte, bouton suivant)-->
			<button id="suivant" class="Suivant"  onclick='deroul()'> Suivant </button>
			<div id="txt2" class="Txt" > ... </div>
			<div id="speaker" class="Speaker" > M. BOUCHER </div>
			
			
			<div id="jeu"><!-- la partie jeu-->

				<!--4 boutons invisibles au niveau des étagères, quand on clique sur l'un d'eux, une fonction se lance et place le livre au bon endroit -->
				<button class="bouton_etagere" id="etagere0" onclick="deplacer(0)"></button>
				<button class="bouton_etagere" id="etagere1" onclick="deplacer(1)"></button>
				<button class="bouton_etagere" id="etagere2" onclick="deplacer(2)"></button>
				<button class="bouton_etagere" id="etagere3" onclick="deplacer(3)"></button>

				<!-- les livres-->
				<img src="images/boucher/0Phedre.png" class="livre" id="Phedre"></img>
				<img src="images/boucher/0LPDC.png" class="livre" id="La princesse de Clèves"></img>
				<img src="images/boucher/0Freud.png" class="livre" id="Le rêve de Timothée"></img>
				<img src="images/boucher/0Saphho.png" class="livre" id="Il me paraît"></img>
				<img src="images/boucher/0BdV.png" class="livre" id="Quand je vois l'alouette"></img>
				<img src="images/boucher/0ArriaMarcella.png" class="livre" id="Arria Marcella"></img>

				<!-- les textes-->
				<img src="images/boucher/1Phedre.png" class="extrait" id="ex0"></img>
				<img src="images/boucher/1LPDC.png" class="extrait" id="ex1"></img>
				<img src="images/boucher/1Freud.png" class="extrait" id="ex2"></img>
				<img src="images/boucher/1Saphho.png" class="extrait" id="ex3"></img>
				<img src="images/boucher/1BdV.png" class="extrait" id="ex4"></img>
				<img src="images/boucher/1ArriaMarcella.png" class="extrait" id="ex5"></img>
			</div>
			
			<!--l'indice : la page cornée de Concombrette -->
			<img id="extrait" src="images/boucher/extrait.png">
			
			<!--l'indice : un autre bouton suivant, et un bouton recommencer -->
			<button id="suivant2" onclick='deroul()'> Suivant </button>
			<button id="restart" onclick='restart()'> Recommencer </button>
		</div>
		
		
			
			
	
		
		<div id="ordi"> <!-- outro-->
			<img src="images/boucher/ordi.jpg"><!--l'ordi -->
			<span class="loader"></span><!--un truc qui charge (pas fini) -->

			<a id="lien" href="cdi.html"> ALLUMER L'ORDINATEUR </a> <!-- un lien vers la page d'Éol-->
		</div>
		<script>
		
		let i = 0 //compteur//
		let paroles = ["Tiens ? On dirait que M. Boucher est ici.", 
		"Allons l'interroger, on ne sait jamais, peut-être qu'il sait quelque chose.",
		"Ô rage ! Ô désespoir ! Ô maladresse ennemie ! N'ai-je tant vécu que pour cette comédie ?",
		"*se tourne* Qui est-ce ? Ah c'est toi ! Comment oublier une écriture aussi affreuse que la tienne..! J'en ai encore des frissons ! ",
		"Non ATTENDS ! J'ai besoin de toi, gamin-e ! Je dois trier cette énorme pile de livres que j'ai fait tomber... Tiens, prends ceux-là et range-les par thèmes, s'il-te-plaît ! Merci!",
		"Pour ranger un livre, clique simplement sur l'étagère correspondante. Bon tri !",
		"",
		"Je te remercie ! Quelle efficacité ! ", 
		"Il me reste ce livre... Pauvre Flaubert ! C'est une insulte à Emma Bovary! M. Concombrette a eu le culot de me le rendre avec une page cornée."];
		// ensemble des paroles du narrateur et de M. BOUCHER, appelées par indice i (de 0 à 7)
		
		let txt1 = document.getElementById("txt1");
		let txt2 = document.getElementById("txt2");
		let speaker1 = document.getElementById("speaker1");
		
		
		function deroul(){// fonction qui structure tout le déroulement de la page (paroles et changements fond) par l'avancement de la valeur de i, 
		// dans l'ordre : intro (Narrateur puis B), jeu, version terminée si tout juste, extrait page cornée, ordi (outro)
		console.log(i)
		if (i<2){
		txt1.innerHTML = paroles[i];
		i = i+1 ; } 
		else if (i <5){
		speaker1.innerHTML = "M. BOUCHER";
		txt1.innerHTML = paroles[i];
		i = i+1}
		else if (i == 5){
		document.getElementById("intro").style.display = "none";
		document.getElementById("fond").style.display = "block";
		txt2.innerHTML = paroles[i];
		
		i = i+1
		
		} // debut jeu
		else if (i == 6 ){
		nouvellequestion(0)}
		
		
		
		else if (i == 7 ||  i==8){//fin du jeu si gagné
		document.getElementById("txt2").style.display="block"
	  document.getElementById("suivant").style.display="block"
	  
	   document.getElementById("speaker").style.display="block"
		txt2.innerHTML = paroles[i];
		i=i+1}
		
		else if (i == "raté"){// fin du jeu si perdu
		document.getElementById("txt2").style.display="block"
	  
	  
	   document.getElementById("speaker").style.display="block"
		txt2.innerHTML = Phrase_erreurs;
		
		}
		else if (i == 9){//suite, partie indice
		
		
		alert("Vous examinez la page cornée par M. Concombrette.");
		document.getElementById("jeu").style.display = "none";
		document.getElementById("txt2").style.display="none"
	
	  
	   document.getElementById("speaker").style.display="none"
		document.getElementById("extrait").style.display = "block";
		i= i+1;}
		else if (i == 10){
		document.getElementById("txt2").style.display="block"
	  document.getElementById("extrait").style.display = "none";
	   document.getElementById("speaker").style.display="block"
	   txt2.innerHTML = "Intéressant ! Renseignons-nous sur les ordinateurs du CDI.";
		i= i+1;
		}

		else {//transition vers l'ordi
		document.getElementById("ordi").style.display = "block";
		document.getElementById("fond").style.display = "none";
		};};
		
		function restart(){// pour recommencer le jeu
		i = 5
		nouvellequestion(0)
		txt2.innerHTML = paroles[5];} //reprend au début du jeu sans l'intro
        </script>
		<script>
let IDlivres=["Phedre","La princesse de Clèves","Le rêve de Timothée","Il me paraît","Quand je vois l'alouette","Arria Marcella"]

let IDtextes=["ex0","ex1","ex2","ex3","ex4","ex5"]
//on initialise tout plein de variables
let numero_question=0//on en est à quel livre ?
let Phrase_erreurs="Malheureusement, tu n'as pas saisi tous les ressorts de ces textes, allons, un peu de sensibilité litteraire ! Recommence, et ne commets pas les mêmes erreurs.  Les livres mal placés sont :"//phrase affichée si le joueur perd avec les noms des livres faux
let nb_de_livres_justes=0

//remplissage c'est le nombre de livres par étagère, pour que si on rajoute un livre, il se déclae par rapport aux autres
let remplissage=[0,0,0,0]


function check () {//activée quand on a placé le dernier livre
	
	if (nb_de_livres_justes==6){// si c'est bon
		i=7;// voir deroul
		deroul()
		
		
	}
	else{// si c'est raté
		i="raté"// voir deroul
		deroul()
		document.getElementById("restart").style.display="block"// on montre le bouton suivant
		
	};
}
</script>
<script>
function nouvellequestion(x){//à chaque nouveau livre
	
	 if (x==0){// si on vient de commencer /de recommencer le jeu
		document.getElementById("restart").style.display="none"// on cache plein de trucs
		document.getElementById("txt2").style.display="none"
		document.getElementById("suivant").style.display="none"
		document.getElementById("suivant1").style.display="none"
		document.getElementById("speaker").style.display="none"
		//on initialise les variables                 
		Phrase_erreurs="Malheureusement, tu n'as pas saisi tous les ressorts de ces textes, allons, un peu de sensibilité litteraire ! Recommence, et ne commets pas les mêmes erreurs.  Les livres mal placés sont :"
		nb_de_livres_justes=0
		numero_question=0
		remplissage=[0,0,0,0]
	
		for (let o=0;o<=5;o++){//on remet les livres à la place de départ (pour chaque numéro, on cache le texte et on remet le livre à sa position de départ)
			document.getElementById(IDlivres[o]).style.cssText="z-index:5;display:none;height: 11vh;position: absolute;bottom: 25vh;left: 20vw;"
			document.getElementById(IDtextes[o]).style.display="none"}
			
		document.getElementById(IDtextes[x]).style.display="block"//on montre le texte 0
		document.getElementById(IDlivres[x]).style.display="block"
	}
	 else if (x<= 5){//pour tous les autres livres (pas le premier)
	
		document.getElementById(IDlivres[x]).style.display="block"//on montre le livre et le texte, et on cache le texte d'avant
		
		document.getElementById(IDtextes[x-1]).style.display="none"
		document.getElementById(IDtextes[x]).style.display="block"
		
	}
	
	 if (x==6){setTimeout("check()",1000)}	// si on a fini, on attend 1 seconde et on lance la fonction check() (correction)
	
 }

largeur_d_un_livre=7.83*window.innerHeight / window.innerWidth;//on calcule la largeur d'un livre en vw (c'est 7,83 en vh)
// enfin je dis largeur d'un livre mais un peu plus pour que les livres soient pas collés 


//principe : on a 4 boutons invisibles au niveau des étagères, selon le bouton sur lequel on clique, le livre actuel vient se mettre dans l'étagère correspondante, à la suite des éventuels livres déjà sur l'étagère
hauteur=["16.26vh","28.59vh","40.66vh","53.37vh"]//listes des ordonnées des étagères

function deplacer(etagere){//fonction activée quand on clique sur une étagère (un bouton invisible), prend en paramètre le numéro de l'étagère
	
		
		X=(57+largeur_d_un_livre*remplissage[etagere])+"vw"//on calcule l'abscisse où le livre doit aller (57= valeur de base (dans la bibliothèque), et on décale d'une lrgeur de livre par livre déjà sur cette étagère, grâce à la liste remplissage)
		
		Y=hauteur[etagere]//on calcule l'ordonnée avec la liste des ordonnées des étagères
		document.getElementById(IDlivres[numero_question]).style.left=X//on  met le bon livre à la bonne position
		document.getElementById(IDlivres[numero_question]).style.top=Y
		remplissage[etagere]++//cette étagère compte un nouveau livre : on update remplissage
		if (etagere==0){
		nb_de_livres_justes++// si le livre est bien dans désir, on augment le nombre de réponses justes
		}
		else{
		Phrase_erreurs=Phrase_erreurs+" "+IDlivres[numero_question]+","// sinon on ajoute le nom du livre à la phrase qui corrige les erreurs
		}
		
		
		numero_question++// question suivante
		nouvellequestion(numero_question)    ;
		


}

</script>
    </body>
</html>
