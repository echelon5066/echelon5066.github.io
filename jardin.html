<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Jardin du Proviseur</title>
		<link rel="stylesheet" href="styles/menu.css">
        <link rel="stylesheet" href="styles/jardin.css">
    </head>
    <body>
<div id="menu_deroulant">
        <button>Menu</button>
        <div class="liens">
        <a href="peccable.html">Suivre M. Peccable</a>
         </div>
		</div>
		
        <div class="image-container">

            <img class="background-image" src="images/jardin/fondJardin.jpg">
			<div id= "rep1">Voilà la scène de crime ! Peut être que les objets nous donnerons un indice ? *Survolez les objets pour obtenir des informations* </div>
			<input id="bouton" type="button" value="suivant" onclick=" effacer()">
            <div class = "rep" id="zoneDeText"></div> 

            <button id="PorteFeuille"> > </button>
            <button id="sac"> > </button>
            <button id="Tasse"> > </button>
            <button id="clé"> > </button>
            <button id="silhouette"> > </button>
        </div>

        <script>
			function effacer(){
				let rep1 = document.getElementById("rep1");	
				rep1.style.display = "none";
				let bouton = document.getElementById("bouton");	
				bouton.style.display = "none";

				AfficherText(PorteFeuille, 0);
				AfficherText(sac, 1);
				AfficherText(Tasse, 2);
				AfficherText(clé, 3);
				AfficherText(silhouette, 4);
			}
			let zoneDeText = document.getElementById("zoneDeText"); 
			zoneDeText.style.display = "none";
			
            let text = [
				"Un porte feuille ? Allons, vous n'allez pas en profit... mais... mais ! stop !!! voler un mort c'est quand même voler enfin !!",
				"Vous cherchez les sujets des contrôles ? Enfin, ce n'est plus d'actualité ! Concentrez-vous sur cette enquête !",
				"Tiens tiens, des tasses... mais, les thés n'ont pas la même couleur !! Et celle-ci dégage une odeur étrange, aurait-on pu l'empoisonner ? Oh! M. Peccable arrive nous pourrions l'interroger etant donné qu'il a trouvé la dépouille. *suivez M. Peccable*",
				"Hmm... des clefs... l'arme du crime ?",
				"Oh, l'empreinte du corps, encore fraîche... tiens il n'y a pas de sang, pourquoi ?"
			];

			let PorteFeuille = document.getElementById("PorteFeuille");
            let sac = document.getElementById("sac");
            let Tasse = document.getElementById("Tasse");
            let clé = document.getElementById("clé");
            let silhouette = document.getElementById("silhouette");
            

            function AfficherText(element, textIndex) {
                element.addEventListener("mouseover", function() {
                    zoneDeText.style.display = "block";
                    zoneDeText.innerHTML = text[textIndex];
                });
                element.addEventListener("mouseout", function() {
                    zoneDeText.style.display = "none";
                });
            }
        </script>
    </body>
</html>
