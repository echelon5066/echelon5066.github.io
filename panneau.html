<html>
    <head>
        <meta charset="UTF-8">
        <title>Panneau du cloître</title>

    </head>
    <body>
		<div class="image-container">

        <img class="background-image" src="images/jardin/fondJardin.jpg">
		<audio controls src="audios/panneau/son_affichage.mp3" id="son"></audio>
		<button id="suivant"> > </button>
		<div id="Txt"> ... </div>
		<div id="Speaker"> NARRATEUR </div>
		</div>
		<script>
		let i = 0 //compteur //
		let paroles = ["H4 talents ..? Questions pour un Champion ..? Tout paraît si trivial maintenant.", " *lancer la musique* ", "De la musique classique ? Le son provient de la D001."];
		let Txt = document.getElementById("Txt");

		bouton.addEventListener("click", deroul);// qd clique change le texte selon compteur//
		function deroul(){
		if (i<=2){
		Txt.innerHTML = paroles[i];
		i = i+1 ; }} // qd ttes les paroles dites, ne fait plus rien//
        </script>
    </body>
