<html>
    <head>
        <meta charset="UTF-8">
        <title>Panneau_affichage</title>
        <style>
            body{background-image: url("affichage.png");background-size: 95%;}
            #suivant{position: absolute; top:580px; left: 1300px; font-size: 65px; background-color : #7A5326; color:white}
			#Txt{position: absolute; top : 590px; left: 50%; transform:translateX(-50%); font-size: 20px; background-color : #7A5326;text-align:center; color:white} 
			#Speaker{position: absolute; top:567px; left: 50%; transform:translateX(-50%); font-size: 20px; background-color : #7A5326;color:white}
            #son{position: absolute; left:3px; top:3px; width : 50px}
        </style>
    </head>
    <body>
		<audio controls src="son.mp3" id="son"></audio>
		<button id="suivant"> > </button>
		<div id="Txt"> ... </div>
		<div id="Speaker"> NARRATEUR </div>
		<script>
		let i = 0 <!--- compteur -->
		let paroles = ["H4 talents ..? Questions pour un Champion ..? Tout paraît si trivial maintenant.", " *lancer la musique* ", "De la musique classique ? Le son provient de la D001."];
		let Txt = document.getElementById("Txt");
		let bouton = document.getElementById("suivant");
		bouton.addEventListener("click", deroul); <!--- qd clique change le texte selon compteur-->
		function deroul(){
		if (i<=2){
		Txt.innerHTML = paroles[i];
		i = i+1 ; }} <!--- qd ttes les paroles dites, ne fait plus rien -->
        </script>
    </body>
</html>
