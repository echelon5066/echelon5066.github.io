<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Eater&display=swap" rel="stylesheet">
  <title>Page d'accueil</title>
</head>
<body>
  
<div id="debut_jeu">
  <div class="fond fond1"></div>
  <button id = "jouer_1" onclick="suivant('debut_jeu','hall_lycee')">JOUER !</button>
  <div id="titre">
    <h1> ESCAPE GAME H4</h1>
    <h2>Le meurtrier est toujours dans le lycée ...</h2>
  </div>
</div>

<div id="hall_lycee">
  <div id="notif_motta">
    <button class="notif_fermer" onclick="fermerNotif()">X</button>
    <div class="notif_titre">Message urgent</div>
    <div class="notif_texte">Annonce de SMG en géno, venir vite !</div>
  </div>

  <div class="fond fond2"></div>
  <button id="aller_geno" onclick="suivant('hall_lycee','salle_geno')">Aller en salle de Génovéfains</button>
</div>
 

<div id="salle_geno">
  
  <video id="video_geno" autoplay muted>
    <source src="D:\VideoProjetNSI.mp4" type="video/mp4">
  </video>
  
  <div id="SMG">

  <div class="cheveux"></div>
	<div class="tete">
    <div class="oeil g"></div>
    <div class="oeil d"></div>
    <div class="bouche"></div>
  </div>

</div>

  
  
  <button id = "retour_hall" onclick="suivant('salle_geno','hall_lycee')">Retourner dans le hall du lycée</button>
</div>

<script>
 function suivant(disparu,apparu){
   document.getElementById(disparu).style.display = "none";
  document.getElementById(apparu).style.display = "block";
 }
 
 function fermerNotif() {
   document.getElementById('notif_motta').style.display = "none";
 }
</script>
  
</body>
</html>
