<html>
    <head>
        <meta charset="UTF-8">
        <title>Jean-Sébastien Peccable</title>
		<link rel="stylesheet" href="styles/peccable.css">
    </head>
    <body>
		<div id="fond">
			<img src="images/peccable/lefond_peccable.png">
			<button id="suivant"> > </button>
			<div id="Txt"> ... </div>
			<div id="speaker"> M. PECCABLE </div>
			<div id="pts"> 0 </div>
			<div id="lettre"><img src="images/peccable/lettre.png" ></div>
		
			<button id="bouton1"> > </button>
			<button id="bouton2"> > </button>
			<button id="bouton3"> > </button>
			<button id="bouton4"> > </button>
			<button id="bouton5"> > </button>
			<button id="bouton6"> > </button>
			<button id="bouton7"> > </button>
		</div>
		<script>
			let i = 0 //compteur//
			let nb = 0 ; //compteur de points//
			let paroles = ["Rhhhhôôôôô...! Comment vais-je faire..!", "*se tourne* Oh ! Quelle chance ! Jeune individu, venez par ici ! Oui, vous ! JE VOUS VOIS ! VENEZ !", 
			"Ah ! Je savais qu'un ange viendrait m'aider...Après tout le malheur qui s'abat sur le lycée, ce n'est que justice..!", 
			"Dites-moi jeune personne, pourriez-vous m'aider ? Je m'appelle Jean-Sébastien Peccable, je suis l'agent d'entretien des salles G.", 
			"Je dois finir mon travail mais je ne trouve plus mes lunettes...", "Vous qui m'avez l'air bon voyant, aidez-moi à repérer ce qu'il faut nettoyer ! Il doit bien en rester au moins 7.",
			"Ah ! Merci beaucoup petit ange ! Grâce à vous je sais quoi faire !", "A commencer par sortir cette poubelle...Oh ?"];
			let Txt = document.getElementById("Txt");
			let bouton = document.getElementById("suivant");
			bouton.addEventListener("click", deroul); // qd clique change le texte selon compteur //
			function deroul(){
			if (i<6){
			Txt.innerHTML = paroles[i];
			i = i+1 ; }
			else if (nb == 7 && i < paroles.length){Txt.innerHTML = paroles[i];
			i = i+1}
			else if (i == paroles.length){alert("Une lettre déchirée tombe de la poubelle.");
			document.getElementById("lettre").style.opacity = "1";
			i = i+1;}
			else if (i > paroles.length){
			document.getElementById("lettre").style.opacity = "0"
			let speaker = document.getElementById("speaker");
			speaker.innerHTML = "NARRATEUR";
			Txt.innerHTML = "Etrange... Bon, il est temps d'aller se renseigner sur les poisons. CDI !";
			};};//qd ttes les paroles du début dites, ne fait plus rien avant que jeu réussi//
			
			let pts = document.getElementById("pts");
			let bouton1 = document.getElementById("bouton1");
			let bouton2 = document.getElementById("bouton2");
			let bouton3 = document.getElementById("bouton3");
			let bouton4 = document.getElementById("bouton4");
			let bouton5 = document.getElementById("bouton5");
			let bouton6 = document.getElementById("bouton6");
			let bouton7 = document.getElementById("bouton7");
			
			bouton1.addEventListener("click", ajout); // qd clique sur le bon endroit, gagne point- 
			bouton2.addEventListener("click", ajout);
			bouton3.addEventListener("click", ajout);
			bouton4.addEventListener("click", ajout);
			bouton5.addEventListener("click", ajout);
			bouton6.addEventListener("click", ajout);
			bouton7.addEventListener("click", ajout);
			function ajout(){
			if (nb<7){ // score max-->
			nb = nb+1
			pts.innerHTML = nb;
			};
			event.target.remove()} ; // retire le bouton une fois qu'il a rapporté un point pour éviter triche
        </script>
    </body>
</html>
